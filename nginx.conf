# ============================================================
# Rate limiting zones
# auth zone: max 10 req/s per IP for auth endpoints (login/register)
# api zone:  max 30 req/s per IP for general API
# ============================================================
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream hostnames are resolved
    # at request time (not at startup), preventing crash if a service is down
    resolver 127.0.0.11 valid=10s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # ============================================================
    # Security headers
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow same-origin + fonts from Google, no inline scripts except React
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================================
    # Rate-limited auth endpoints (login / register / forgot / reset)
    # 10 requests per minute per IP, burst of 5
    # ============================================================
    location ~ ^/api/auth/(sign-in|sign-up|forgot|reset|resend-verification) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        set $auth_upstream http://auth-service:8081;
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Proxy /api/auth/* → auth-service /auth/*
    # Frontend sends: /api/auth/signup  →  auth-service receives: /auth/signup
    location /api/auth/ {
        set $auth_upstream http://auth-service:8081;
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Proxy /api/profile → auth-service /profile
    location /api/profile {
        set $auth_upstream http://auth-service:8081;
        rewrite ^/api/profile(.*)$ /profile$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Proxy /api/* → tree-service /* (strip /api prefix)
    # Frontend sends: /api/trees/1  →  tree-service receives: /trees/1
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        set $tree_upstream http://tree-service:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $tree_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        client_max_body_size 50M;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
