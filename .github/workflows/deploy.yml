name: Deploy Frontend to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e

            echo "=== [1/5] Pulling latest Frontend code ==="
            cd ~/vkr/FamilyTree-Frontend
            git pull origin main

            echo "=== [2/5] Stopping and removing existing frontend container ==="
            docker stop familytree-frontend 2>/dev/null || true
            docker rm familytree-frontend 2>/dev/null || true

            echo "=== [3/5] Rebuilding and starting frontend container ==="
            docker compose up --build -d

            echo "=== [4/5] Waiting for frontend to start ==="
            sleep 10

            echo "=== [5/5] Container status ==="
            docker compose ps

            echo "=== [6/6] Health check ==="
            curl -sf http://localhost:3000 > /dev/null && echo "Frontend: OK" || echo "Frontend: FAILED"

            echo "=== Deploy complete ==="
